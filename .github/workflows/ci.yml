name: CI - Validate & Plan

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 on Lambda functions and Glue jobs
        run: |
          flake8 lambda_functions/ glue_jobs/ \
            --max-line-length=120 \
            --ignore=E501,W503,E402

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform Init
        working-directory: terraform/
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform/
        run: terraform validate

  terraform-plan-dev:
    name: Terraform Plan (dev)
    runs-on: ubuntu-latest
    needs: [lint, terraform-validate]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Temporary credential guard — see deploy.yml. Skips the AWS-backed plan
      # (and passes) until valid AWS credentials are configured, then runs it
      # automatically once they are.
      - name: Check AWS credentials
        id: check
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Plan skipped::AWS credentials are not set. Skipping the dev Terraform plan — this job is a no-op and will pass. Add valid AWS secrets to enable it."
          elif aws sts get-caller-identity >/dev/null 2>&1; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "AWS credentials valid — running the dev Terraform plan."
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Plan skipped::AWS credentials are present but invalid (sts:GetCallerIdentity failed). Skipping the dev Terraform plan — this job is a no-op and will pass. Update the secrets to enable it."
          fi

      - name: Configure AWS credentials
        if: steps.check.outputs.deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        if: steps.check.outputs.deploy == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        if: steps.check.outputs.deploy == 'true'
        working-directory: terraform/environments/dev/
        run: terraform init

      - name: Terraform Plan
        if: steps.check.outputs.deploy == 'true'
        working-directory: terraform/environments/dev/
        run: terraform plan -var-file=terraform.tfvars -out=tfplan

      - name: Upload plan artifact
        if: steps.check.outputs.deploy == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev
          path: terraform/environments/dev/tfplan
          retention-days: 5
